name: Collect and publish static intelligence

on:
  workflow_dispatch:
  schedule:
    # Four runs per day keeps public-source traffic and Actions usage modest.
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sentinel-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python src/main.py
        env:
          PYTHONPATH: src
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
      - name: Commit validated publication
        run: |
          if git diff --quiet -- data; then
            echo "No publication changes"
            exit 0
          fi
          git config user.name "sentinel-grid-bot"
          git config user.email "sentinel-grid-bot@users.noreply.github.com"
          git add data/database/events.json data/output
          git commit -m "data: publish validated intelligence update"
          git push
